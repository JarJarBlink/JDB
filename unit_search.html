/* 比較籃子樣式 - 底部浮動條 */
#compare_basket {
  display: none; 
  position: fixed; 
  bottom: 20px; 
  left: 50%; 
  transform: translateX(-50%); 
  background: var(--color-title-bc); 
  color: var(--text-color); 
  padding: 8px 15px; /* 手機版縮減內邊距 */
  border-radius: 50px; 
  z-index: 9999; 
  align-items: center; 
  gap: 8px; /* 縮小物件間距 */
  border: 1px solid var(--color-table-default-border); 
  box-shadow: 0 4px 15px var(--shadow-color);
  
  /* 關鍵屬性：強制不換行 */
  white-space: nowrap; 
  width: max-content;
  max-width: 95vw; /* 防止超出螢幕寬度 */
}
#btn_start_compare {
  white-space: nowrap;
  flex-shrink: 0; /* 防止按鈕被擠壓 */
}

#btn_clear_basket {
  white-space: nowrap;
  flex-shrink: 0;
}

@media screen and (max-width: 480px) {
  #compare_basket {
    padding: 6px 12px;
    gap: 6px;
    font-size: 12px; /* 稍微縮小文字 */
  }
  
  #btn_start_compare {
    padding: 5px 10px !important;
    font-size: 12px;
  }
  
  #btn_clear_basket {
    padding: 3px 8px !important;
    font-size: 11px;
  }
}

.basket-content { 
  display: flex; 
  align-items: center; 
  gap: 15px; 
}

.compare-trigger { 
  background: #ff9800; /* 保持橘色作為強調 */
  border: none; 
  color: white; 
  padding: 8px 15px; 
  border-radius: 20px; 
  cursor: pointer; 
  font-weight: bold;
}

.clear-basket { 
  background: transparent; 
  border: 1px solid var(--color-white-227); 
  color: var(--color-white-227); 
  cursor: pointer; 
  border-radius: 20px; 
  padding: 5px 10px; 
}

/* 模態框背景遮罩 */
.modal-overlay {
  position: fixed; 
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100%;
  /* 遮罩在淺色模式下稍微淡一點，深色模式保持深色 */
  background: rgba(0, 0, 0, 0.7); 
  z-index: 10000; 
  display: flex; 
  justify-content: center; 
  align-items: center;
  backdrop-filter: blur(3px);
}

/* 模態框主體 */
.modal-content {
  background: var(--background-color); 
  width: 90%; 
  max-width: 800px; 
  max-height: 90vh;
  border-radius: 12px; 
  overflow-y: auto; 
  padding: 20px; 
  color: var(--text-color);
  border: 1px solid var(--color-table-default-border);
}

.modal-header { 
  display: flex; 
  justify-content: space-between; 
  align-items: center;
  border-bottom: 1px solid var(--color-table-default-border); 
  padding-bottom: 10px; 
}

.radar-container { 
  width: 100%; 
  max-width: 400px; 
  margin: 0 auto; 
  padding: 20px 0; 
}

/* VS 按鈕樣式 (表格內) */
.btn-vs {
  background: var(--color-blue-bc); 
  color: #000; /* 藍色背景配黑色文字 */
  border: none; 
  padding: 4px 8px;
  border-radius: 4px; 
  cursor: pointer; 
  font-size: 11px;
  font-weight: bold;
  transition: 0.2s;
}

/* VS 按鈕選中狀態 */
.btn-vs.active { 
  background: var(--color-red-bc); 
  color: white; 
}

/* 對比數據表格 */
#comparison_data_table { 
  width: 100%; 
  border-collapse: collapse; 
  margin-top: 20px; 
  color: var(--text-color);
}

#comparison_data_table th {
  background: var(--color-table-linkpage-table_header-bc);
  color: var(--color-white-227);
  border: 1px solid var(--color-table-default-border);
  padding: 10px;
}

#comparison_data_table td { 
  border: 1px solid var(--color-table-default-border); 
  padding: 8px; 
  text-align: center; 
}

/* 較優數據高亮 */
.stat-better { 
  color: var(--color-green-bc) !important; 
  font-weight: bold; 
}
