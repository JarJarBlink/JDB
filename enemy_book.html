<!DOCTYPE HTML>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=1">
<title>JAR Battle Cats Database</title>
<link rel="icon" href="static/favicon.ico">
<link rel="stylesheet" href="static/css/database/style.css">
<link rel="stylesheet" href="static/css/database/origin.css">
<link rel="stylesheet" href='static/css/home/style_a.css'>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta name="format-detection" content="telephone=no">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="">
<link rel="stylesheet" href="static/dark-mode-toggle/dark.css"   media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="static/dark-mode-toggle/light.css"  media="(prefers-color-scheme: light)">
<link rel="stylesheet" href="static/dark-mode-toggle/common.css">
<link rel="stylesheet" href="static/dark-mode-toggle/slider.css">
<script type="module" src="static/dark-mode-toggle/dark-mode-toggle-playground.js"></script>
<script type="module" src="static/dark-mode-toggle/dark-mode-toggle.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<style>
#eb-header {
  background: var(--color-title-bc, #383838);
  border-bottom: 1px solid var(--color-default-border, #ccc);
  padding: 8px 12px 0;
  display: flex;
  align-items: flex-end;
  gap: 12px;
  flex-wrap: wrap;
}

#eb-header h2 {
  font-size: clamp(18px, 3.5vw, 28px);
  font-weight: 900;
  color: var(--color-h2, #fff);
  padding: 5px 10px 8px;
  margin: 0;
  background: none;
  flex: 1;
  line-height: 1.2;
  min-width: 0;
}

#eb-header h2 span {
  color: var(--accent-color, #e84848);
}

/* Lang */
.lang-switcher {
  display: flex;
  gap: 4px;
  padding-bottom: 8px;
  align-self: flex-end;
}
.lang-dropdown { position: relative; }
.lang-select {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 4px 22px 4px 12px;
  min-width: 52px;
  text-align: center;
  border-radius: 4px;
  border: 1px solid var(--color-default-border, #ccc);
  background-color: var(--color-button-bc, #e8e8e8);
  color: var(--color-button, #090909);
  cursor: pointer;
  transition: opacity 0.15s;
  text-transform: uppercase;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'><path d='M0 0l5 6 5-6z' fill='%23090909'/></svg>");
  background-repeat: no-repeat;
  background-position: right 8px center;
  background-size: 9px 6px;
}
.lang-select:hover { opacity: 0.8; }
.lang-select:focus { outline: none; border-color: var(--accent-color, #e84848); }

.lang-options {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  margin: 0;
  padding: 4px 0;
  list-style: none;
  background: var(--color-button-bc, #fff);
  border: 1px solid var(--color-default-border, #ccc);
  border-radius: 4px;
  box-shadow: var(--shadow-color, rgba(0,0,0,0.2)) 0 4px 12px;
  display: none;
  z-index: 20;
  overflow: hidden;
}
.lang-options.open { display: block; }
.lang-options li {
  padding: 6px 0;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-align: center;
  text-transform: uppercase;
  color: var(--color-button, #090909);
  cursor: pointer;
}
.lang-options li:hover { opacity: 0.75; }
.lang-options li.active {
  background: var(--accent-color, #e84848);
  color: #fff;
}

/* Controls bar */
#eb-controls {
  background: var(--color-desc-bc, #fff);
  border-bottom: 1px solid var(--color-default-border, #ccc);
  padding: 6px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 9;
}

.stat-badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid var(--color-default-border, #ccc);
  background: var(--color-table-simple-th-bc, #efe3e3);
  color: var(--text-color, #000);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: all 0.15s;
}
.stat-badge:hover { opacity: 0.75; }
.stat-badge b { color: var(--accent-color, #e84848); }

.stat-badge.stat-active {
  background: var(--accent-color, #e84848);
  border-color: var(--accent-color, #e84848);
  color: #fff;
}
.stat-badge.stat-active b { color: #fff; }
.stat-badge.stat-active-limited {
  background: var(--color-rare-salmon-bc, #ffe0c0);
  border-color: var(--color-table-border2, #d4b070);
  color: var(--text-color, #000);
}
.stat-badge.stat-active-collab {
  background: var(--color-darkeye-bc, #eed8f8);
  border-color: var(--color-darkeye-bc, #eed8f8);
  color: var(--text-color, #000);
}
.stat-badge.stat-active-overseas {
  background: #cfe3f7;
  border-color: #6fa8dc;
  color: var(--text-color, #000);
}

/* Search */
.search-wrap { position: relative; margin-left: auto; }
.search-wrap input {
  font-size: 12px;
  padding: 3px 8px 3px 26px;
  background: var(--color-base-bc, #fff) !important;
  border: 1px solid var(--color-default-border, #ccc) !important;
  border-radius: 3px;
  color: var(--text-color, #000) !important;
  width: 110px;
  outline: none;
  transition: border-color 0.2s, width 0.2s;
}
.search-wrap input:focus { border-color: var(--color-title-bc, #383838) !important; width: 150px; }
.search-wrap::before {
  content: '🔍';
  position: absolute;
  left: 6px; top: 50%; transform: translateY(-50%);
  font-size: 10px;
  pointer-events: none;
}

#eb-main {
  text-align: left;
  margin: 0 auto;
  min-height: 100%;
  background: var(--color-article-bc, #fff);
}
@media only screen and (min-width: 750px) { #eb-main { max-width: 740px; } }

#eb-grid-wrap {
  padding: 8px 8px 40px;
}

.eb-grid {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.enemy-card {
  position: relative;
  background: var(--color-article-bc, #fff);
  border: 1px solid var(--color-default-border, #e2e2e2);
  padding: 6px 3px 4px;
  text-align: center;
  cursor: pointer;
  transition: background-color 0.12s;
  overflow: hidden;
  box-sizing: border-box;
  animation: eb-fadeUp 0.22s ease both;
}
.enemy-card:hover {
  background: var(--color-table-simple-th-bc, #f2f2f2);
  z-index: 2;
}
.enemy-card.limited {
  background: color-mix(in srgb, var(--color-rare-salmon-bc, #ffe0c0) 40%, var(--color-article-bc, #fff));
}
.enemy-card.limited:hover {
  background: var(--color-rare-salmon-bc, #ffe0c0);
}
.enemy-card.collab {
  background: color-mix(in srgb, var(--color-darkeye-bc, #eed8f8) 40%, var(--color-article-bc, #fff));
}
.enemy-card.collab:hover {
  background: var(--color-darkeye-bc, #eed8f8);
}
.enemy-card a { display: block; text-decoration: none; color: inherit; }
.enemy-card img {
  width: 70%;
  aspect-ratio: 1 / 1;
  image-rendering: pixelated;
  display: block;
  margin: 0 auto 2px;
}

.enemy-card .id-label {
  font-size: 8px;
  color: var(--text-color, #333);
  opacity: 0.55;
  line-height: 1;
}


@keyframes eb-fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Empty state */
.empty-state {
  text-align: center;
  color: var(--text-color, #333);
  opacity: 0.45;
  font-size: 12px;
  padding: 36px 0;
  border: 1px solid var(--color-default-border, #e2e2e2);
}

/* 補滿最後一列用的空白格，維持邊框但無互動效果 */
.enemy-card-empty {
  background: var(--color-article-bc, #fff);
  border: 1px solid var(--color-default-border, #e2e2e2);
  cursor: default;
  pointer-events: none;
}

/* Scroll-top button */
#eb-scrollTop {
  position: fixed;
  bottom: 18px; right: 16px;
  width: 36px; height: 36px;
  background: var(--color-button-bc, #e8e8e8);
  border: 1px solid var(--color-default-border, #ccc);
  border-radius: 50%;
  color: var(--color-button, #090909);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
  z-index: 100;
  box-shadow: var(--shadow-color, rgba(0,0,0,0.2)) 1px 2px 6px;
}
#eb-scrollTop.visible { opacity: 1; }
#eb-scrollTop:hover { border-color: var(--color-title-bc, #383838); }

@media (max-width: 600px) {
  #eb-controls { gap: 4px; }
  #eb-header { flex-wrap: wrap; }
  .lang-switcher { padding-bottom: 4px; }
}
</style>
</head>
<body>

<!-- ─── 全部包進 article，max-width: 740px 約束 ─── -->
<article id="eb-main">

  <!-- Header -->
  <div id="eb-header">
    <div style="flex:1; min-width:0;">
      <h2 id="txt-title">敵キャラ<span id="txt-title2">図鑑</span></h2>
    </div>
    <div class="lang-switcher">
      <div class="lang-dropdown" id="langDropdown">
        <button type="button" class="lang-select" id="langBtn" aria-haspopup="listbox" aria-expanded="false">JA</button>
        <ul class="lang-options" id="langOptions" role="listbox">
          <li role="option" data-cc="ja">JA</li>
          <li role="option" data-cc="tw">TW</li>
          <li role="option" data-cc="en">EN</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div id="eb-controls">
    <div id="statAll"    class="stat-badge stat-active" data-filter="all">-</div>
    <div id="statNorm"   class="stat-badge" data-filter="normal">-</div>
    <div id="statLim"    class="stat-badge" data-filter="limited">-</div>
    <div id="statCollab" class="stat-badge" data-filter="collab">-</div>
    <div id="statOverseas" class="stat-badge" data-filter="overseas">-</div>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="-" maxlength="6">
    </div>
  </div>

  <!-- Grid -->
  <div id="eb-grid-wrap">
    <table id="enemyGrid" class="eb-grid"><tbody></tbody></table>
  </div>

  <!-- Contact -->
  <div class="contact">
    <ul>
      <li id="contact1"><a href='index.html' rel="noopener"><img src="static/img/icon/bottom_bg01.png" width="18" class="icon"/>Home</a></li>
      <li id="contact2">　</li>
    </ul>
  </div>

  <dark-mode-toggle class="slider" mode="dark" style="display: none; pointer-events: none;"></dark-mode-toggle>

</article>

<button id="eb-scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">▲</button>

<script src="static/js/book/enemy_book.js"></script>
</body>
</html>
