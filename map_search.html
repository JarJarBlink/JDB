<!DOCTYPE HTML><html lang=ja><head><meta charset=UTF-8><meta name=viewport content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=1"><title>JAR Battle Cats Database</title><link rel=icon href=static/favicon.ico><link rel=stylesheet href=static/css/database/style.css><link rel=stylesheet href=static/css/database/origin.css><link rel=stylesheet href=static/css/home/style_a.css><link rel=stylesheet href=static/css/database/map/pagination.css><link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css><meta http-equiv=Pragma content=no-cache><meta http-equiv=Cache-Control content=no-cache><meta http-equiv=Expires content=0><meta name=format-detection content="telephone=no"><meta name=robots content=noindex><noscript><style>body { display: none; }</style></noscript><script src=https://code.jquery.com/jquery-3.7.1.min.js></script><script async src="https://www.googletagmanager.com/gtag/js?id=G-4C7WJXPKMY"></script><script src=static/js/home/ga.js></script><script src=https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js></script><script type=module src=static/js/map/map_s.js></script><meta name=color-scheme content="dark light"><meta name=theme-color content><link rel=stylesheet href=static/dark-mode-toggle/dark.css media="(prefers-color-scheme: dark)"><link rel=stylesheet href=static/dark-mode-toggle/light.css media="(prefers-color-scheme: light)"><link rel=stylesheet href=static/dark-mode-toggle/common.css><link rel=stylesheet href=static/dark-mode-toggle/slider.css><script type=module src=static/dark-mode-toggle/dark-mode-toggle-playground.js></script><script type=module src=static/dark-mode-toggle/dark-mode-toggle.js></script><link rel=stylesheet href=static/css/spine/spine-player.css><script src=static/js/spine/spine-player.js></script><script src=static/js/spine/spine-mascot-text.js></script><script src=static/js/spine/spine-mascot.js></script><style>
#stage0_block { font-size: .88rem; }

/* ── filter-section ── */
.filter-section {
    border: 1px solid rgba(128,128,128,0.25);
    border-radius: 8px;
    margin-bottom: 6px;
    overflow: hidden;
}
.filter-section-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    font-size: .88rem;
    background: rgba(128,128,128,0.07);
    transition: background .15s;
}
.filter-section-header:hover { background: rgba(128,128,128,0.15); }
.filter-section-arrow {
    font-style: normal;
    font-size: .7rem;
    transition: transform .2s;
    color: #888;
    flex-shrink: 0;
}
.filter-section.open > .filter-section-header .filter-section-arrow {
    transform: rotate(90deg);
}
.filter-section-body {
    display: none;
    padding: 8px 10px 10px;
}
.filter-section.open > .filter-section-body { display: block; }

.filter-section-badge {
    margin-left: auto;
    background: #2378c3;
    color: #fff;
    font-size: .68rem;
    font-weight: 700;
    border-radius: 10px;
    padding: 1px 7px;
    display: none;
    white-space: nowrap;
}
.filter-section-badge.visible { display: inline-block; }

/* ── チェックボックス付きフィルターバー ── */
.perm-filter-bar,
.week-filter-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 5px;
    padding: 2px 0;
    user-select: none;
}

/* 出現パターン：チェックボックスラベル */
.map-chk-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: .82rem;
    cursor: pointer;
    padding: 3px 10px 3px 7px;
    border-radius: 14px;
    border: 1px solid rgba(128,128,128,0.4);
    transition: background .15s, border-color .15s;
    white-space: nowrap;
}
.map-chk-label input[type="checkbox"] {
    margin: 0;
    accent-color: #2378c3;
    width: 13px;
    height: 13px;
    cursor: pointer;
    flex-shrink: 0;
}
.map-chk-label:has(input:checked) {
    background: rgba(35,120,195,.13);
    border-color: #2378c3;
}

/* 曜日：チェックボックスラベル */
.map-week-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: .82rem;
    cursor: pointer;
    padding: 3px 10px 3px 7px;
    border-radius: 14px;
    border: 1px solid rgba(128,128,128,0.4);
    transition: background .15s, border-color .15s;
    white-space: nowrap;
}
.map-week-label input[type="checkbox"] {
    margin: 0;
    accent-color: #d97706;
    width: 13px;
    height: 13px;
    cursor: pointer;
    flex-shrink: 0;
}
.map-week-label:has(input:checked) {
    background: rgba(217,119,6,.11);
    border-color: #d97706;
}

.perm-loading-tip {
    font-size: .78rem;
    opacity: .6;
    font-style: italic;
}

/* ── カテゴリ選取ハイライト ── */
#maparea th { font-size: .84rem; }
.mapBtn {
    display: block;
    width: 100%;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background .12s;
}
.mapBtn:hover { background: rgba(35,120,195,.12); }
.mapBtn-active {
    background: rgba(35,120,195,.22) !important;
    color: #2378c3;
    font-weight: 700;
}

/* ── キーワード検索バー ── */
.map-search-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin: 8px 0 4px;
}
.map-search-row input[type="text"] {
    flex: 1;
    font-size: .85rem;
    padding: 5px 8px;
    border-radius: 6px;
    border: 1px solid rgba(128,128,128,0.4);
    background: transparent;
    box-sizing: border-box;
    min-width: 0;
}
#btn_map_search,
#btn_map_clear {
    font-size: .82rem;
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid rgba(128,128,128,0.5);
    background: transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s;
}
#btn_map_search:hover { background: rgba(35,120,195,.15); }
#btn_map_clear:hover  { background: rgba(200,50,50,.10); }

/* ── 結果カウント ── */
#map_result_count {
    font-size: .8rem;
    opacity: .75;
    margin: 2px 0 6px;
}

/* ── 結果テーブル ── */
.table_style_db_unit th[data-sort] { cursor: pointer; }
.table_style_db_unit th.sort-active { color: #2378c3; }
.sort-arrow { font-size: .68rem; margin-left: 3px; }

/* badge */
.map-perm-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .02em;
    white-space: nowrap;
}
.badge-perm { background: #1a6fa8; color: #fff; }
.badge-temp { background: #b5460f; color: #fff; }
</style></head><body><article><h2 id=map_overview></h2><div id=stage0_block class=block><p class=name></p><div class="filter-section open" id=section_perm_week><div class=filter-section-header><i class=filter-section-arrow>▶</i><span id=label_perm_section></span><span class=filter-section-badge id=badge_section_perm></span><span class=filter-section-badge id=badge_section_week></span></div><div class=filter-section-body><span id=permFilter_label style=font-size:.82rem;font-weight:600;display:block;margin-bottom:4px;></span><div id=permFilterBar class=perm-filter-bar></div><div style=margin-top:8px;><span id=weekFilter_label style=font-size:.82rem;font-weight:600;display:block;margin-bottom:4px;></span><div id=weekFilterBar class=week-filter-bar></div></div></div></div><p class=litele_space style=margin-bottom:0.5rem;></p><div class="filter-section open" id=section_maptype><div class=filter-section-header><i class=filter-section-arrow>▶</i><span id=lbl_map_search_title>MAP Search</span><span class=filter-section-badge id=badge_section_maptype></span></div><div class=filter-section-body><table id=maparea class=table_style_linkpage style=width:100%;margin:0;></table><div class=map-search-row id=stage-filter-row><label for=map-stage-text id=lbl_stage_label style=font-size:.82rem;white-space:nowrap;flex-shrink:0;></label><input type=number id=map-stage-text min=0 style=width:90px;flex:unset; placeholder=0><span id=lbl_stage_hint style=font-size:.75rem;opacity:.6;></span></div></div></div><div class=map-search-row><input type=text id=map-search-text placeholder=…><button id=btn_map_search><span id=lbl_btn_search>検索</span></button><button id=btn_map_clear><span id=lbl_btn_clear>クリア</span></button></div><div id=map_result_count></div><div id=output></div></div><div class=contact><ul><li id=contact1><a href=index.html rel=noopener><img src=static/img/icon/bottom_bg01.png width=18 class=icon>Home</a></li><li id=contact2>　</li></ul></div><dark-mode-toggle class=slider mode=dark style=display:none;pointer-events:none;></dark-mode-toggle></article><div id=spine-mascot style=position:fixed;bottom:0;right:0;width:250px;height:250px;z-index:9999;pointer-events:none;display:none;></div><script>
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.matches('#map-search-text, #map-stage-text')) {
        e.preventDefault();
        document.getElementById('btn_map_search')?.click();
    }
});
</script></body></html>
