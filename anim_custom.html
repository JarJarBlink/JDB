<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=1">
<title>JAR Battle Cats Database</title>
<link rel="icon" href="static/favicon.ico">
<link rel="stylesheet" href='static/css/database/anim/anim.css'>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4C7WJXPKMY"></script>
<script src="static/js/home/ga.js"></script>
<script>
/*Coded by Exodia JAR. Contact me: https://x.com/eUqQxBRzSbCq7Uz */
const _origGetContext = HTMLCanvasElement.prototype.getContext;
HTMLCanvasElement.prototype.getContext = function(type, attributes) {
    if (type === '2d') {
        attributes = Object.assign({ willReadFrequently: true }, attributes || {});
    }
    return _origGetContext.call(this, type, attributes);
};
</script>
<script src="static/js/anim/gifshot.min.js"></script>
</head>
<body>
    <div class="animation-container" id="container">

        <!-- Upload Overlay -->
        <div id="custom-upload-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; display:flex; align-items:center; justify-content:center;">
            
            <div class="wiki-panel" style="width:450px; padding:25px; box-shadow: 0 0 50px rgba(0,0,0,0.5);">
                <h3 style="margin-top:0; color:#ffcc00; letter-spacing:1px;">Battle Cats Asset Loader</h3>
                
                <div style="display:flex; flex-direction:column; gap:15px; font-size:13px;">
                    <p style="color:#aaa; margin:0;">
                        Select or drag all required files at once:<br>
                        <span style="font-size:11px; color:#777;">(.png, .imgcut, .mamodel, .maanim)</span>
                    </p>
                    
                    <!-- Batch Upload Input -->
                    <div style="border: 2px dashed rgba(255,255,255,0.2); padding: 30px; text-align: center; border-radius: 12px; background: rgba(255,255,255,0.05);">
                        <input type="file" id="batch-upload" multiple style="width:100%; cursor:pointer;">
                    </div>

                    <!-- File Detection Preview -->
                    <div id="file-list-preview" style="background:rgba(0,0,0,0.4); padding:15px; border-radius:8px; min-height:100px; font-family:'Courier New', monospace; font-size:12px; color:#ddd; line-height:1.6; border:1px solid rgba(255,255,255,0.1);">
                        <span style="color:#666;">Waiting for files...</span>
                    </div>
                </div>
                
                <button id="btn-build-asset" class="viewer-button" style="width:100%; margin-top:20px; padding:15px; background:var(--accent-gold) !important; color:black !important;">BUILD & PLAY</button>
                <p id="up-status" style="font-size:12px; margin-top:10px; color:#ffcc00; text-align:center; min-height:1.2em;"></p>
            </div>
        </div>

        <!-- 視角工具 (左上) -->
        <div class="zoom-controls ui-element">
            <!-- 手機用：Camera 圖示按鈕 -->
            <div id="mobile-camera-btn">📷</div>
            <div class="wiki-panel" style="display:flex; flex-direction:column; gap:6px;">
                <div class="ui-label">Camera</div>
                <div class="custom-btn" id="zoom-in">＋ Zoom In</div>
                <div class="custom-btn" id="zoom-out">－ Zoom Out</div>
                <div class="custom-btn" id="reset-view">↺ Reset</div>
                <div class="ui-label" style="margin-top: 8px;">Background</div>
                <div class="custom-btn" id="btn-upload-bg">🖼 Upload BG</div>
                <div class="custom-btn" id="btn-reset-bg" style="display:none; color: #ff6666 !important; border-color: rgba(255,102,102,0.4) !important;">✕ Clear BG</div>
                <input type="file" id="bg-input" accept="image/*" style="display: none;">
            </div>
        </div>

        <!-- 數據面板 (右上) -->
        <div class="viewer-menu wiki-panel ui-element" id="main-menu"></div>

        <!-- 播放控制 (左下，桌面用) -->
        <div class="viewer-bottom-left ui-element" id="bottom-controls"></div>

        <!-- 隱藏開關 (右下，桌面用) -->
        <div id="toggle-ui-btn" title="Toggle UI">
            <svg class="icon-ui" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        </div>
        <!-- ════════════════════════════════
             手機底部控制列（手機專用）
        ════════════════════════════════ -->
        <div id="mobile-bottom-bar">
            <!-- 把手：播放按鈕 + 幀數 + 收合箭頭 -->
            <div id="mobile-bar-handle">
                <div id="mobile-bar-quick">
                    <button id="mobile-play-btn">▶ Play</button>
                    <span id="mobile-frame-display">Frame 0 / 0</span>
                </div>
                <div id="mobile-bar-toggle">▲</div>
            </div>

            <!-- 展開內容 -->
            <div id="mobile-bar-content">
                <!-- Form 切換（viewer.js 動態填入，如有多 form）-->
                <div id="mobile-form-row"></div>

                <!-- 動畫選單 + 幀數控制 -->
                <div id="mobile-frame-row">
                    <select class="select-mode" id="mobile-mode-select"></select>
                    <div class="frame-group">
                        <button class="frame-adjust-btn" id="mobile-frame-minus">-</button>
                        <input class="input-frame" id="mobile-frame-input" type="number" value="0" min="0">
                        <button class="frame-adjust-btn" id="mobile-frame-plus">+</button>
                    </div>
                </div>

                <!-- KB Soul 按鈕 -->
                <div id="mobile-extra-row">
                    <button class="viewer-button" id="mobile-kb-btn">💀 KB → Soul</button>
                </div>
            </div>
        </div>
    </div>
    <script src="static/js/anim/viewer.js"></script>
    <script src="static/js/anim/control.js"></script>
</body>
</html>
