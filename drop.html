<dark-mode-toggle class="slider" mode="dark" style="display:none; pointer-events:none;"></dark-mode-toggle>

<script>
// 滑鼠拖動橫向捲動（pc）
document.querySelectorAll('.drop-table-wrap').forEach(el => {
    let isDown = false, startX, scrollLeft;

    el.addEventListener('mousedown', e => {
        isDown     = true;
        startX     = e.pageX - el.offsetLeft;
        scrollLeft = el.scrollLeft;
        el.style.cursor = 'grabbing';
        el.style.userSelect = 'none';
    });

    el.addEventListener('mouseleave', () => { isDown = false; el.style.cursor = 'grab'; });
    el.addEventListener('mouseup',    () => { isDown = false; el.style.cursor = 'grab'; el.style.userSelect = ''; });

    el.addEventListener('mousemove', e => {
        if (!isDown) return;
        e.preventDefault();
        const x    = e.pageX - el.offsetLeft;
        const walk = (x - startX) * 1.2;    //1.2 加快速度
        el.scrollLeft = scrollLeft - walk;
    });
});
</script>
