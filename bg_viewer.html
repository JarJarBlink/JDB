<style>
    #gridView *, #detailView * { box-sizing: border-box; }

    /* ── 頁面背景 ── */
    #gridView {
        background: var(--background-color, #15151a);
        min-height: 100vh;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #detailView {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* ── Grid view ── */
    #gridHeader {
        color: var(--text-color, #eee); font-size:18px; font-weight:600;
        margin:0 0 12px 4px;
    }
    #grid {
        display:grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap:10px;
    }
    .thumb {
        position:relative; aspect-ratio: 4/3; border-radius:8px; overflow:hidden;
        background:#222; cursor:pointer; border:1px solid #333;
        transition: transform .12s, border-color .12s;
    }
    .thumb:hover { transform:scale(1.03); border-color:#6cf; }
    .thumb canvas { width:100%; height:100%; display:block; object-fit:cover; }
    .thumb .label {
        position:absolute; bottom:0; left:0; right:0;
        background:rgba(0,0,0,0.55); color:#fff; font-size:11px;
        padding:3px 6px; font-family: monospace;
    }
    .thumb .ph {
        position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
        color:#555; font-size:11px;
    }

    /* ── Detail view ── */
    #detailView { display:none; position:fixed; inset:0; background:#111; z-index:50; }
    #detailView.active { display:block; }
    #glcanvas { display:block; width:100%; height:100%; }
    #panel {
        position:absolute; top:8px; left:8px; z-index:10;
        background:rgba(0,0,0,0.6); color:#fff; padding:8px 10px;
        font:13px/1.6 monospace; border-radius:6px;
        display:flex; align-items:center; gap:8px;
    }
    #backBtn {
        cursor:pointer; background:#333; color:#fff; border:1px solid #555;
        border-radius:4px; padding:4px 10px; font:13px monospace;
    }
    #backBtn:hover { background:#444; }
    #prevBtn, #nextBtn {
        cursor:pointer; background:#333; color:#fff; border:1px solid #555;
        border-radius:4px; padding:4px 8px; font:13px monospace;
        min-width:36px; min-height:36px;
    }
    #prevBtn:hover, #nextBtn:hover { background:#444; }
    #prevBtn:disabled, #nextBtn:disabled { opacity:0.3; cursor:default; }
    #status { color:#9f9; white-space:pre-wrap; }
</style>
</head>
<body>

<article>
<div id="gridView">
    <div id="gridHeader">All Backgrounds (click to preview effects)</div>
    <div id="grid"></div>
</div>

<div id="detailView">
    <canvas id="glcanvas"></canvas>
    <div id="panel">
        <button id="backBtn">&larr; Back to list</button>
        <button id="prevBtn">&#9664;</button>
        <span id="detailLabel"></span>
        <button id="nextBtn">&#9654;</button>
        <span id="status"></span>
    </div>
</div>
<dark-mode-toggle class="slider" mode="dark" style="display: none; pointer-events: none;"></dark-mode-toggle>
</article>

<script type="module" src="static/js/game/bg_viewer.js"></script>

</body>
